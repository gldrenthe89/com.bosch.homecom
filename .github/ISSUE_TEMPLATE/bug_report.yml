name: Bug Report
description: Report a bug with the Bosch HomeCom Easy Community app
title: "[BUG] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: dropdown
    id: device-model
    attributes:
      label: Bosch device model
      options:
        - K30
        - K40
    validations:
      required: true

  - type: dropdown
    id: homey-model
    attributes:
      label: Homey model
      options:
        - Pro
        - Pro (Early 2023)
        - Bridge
        - Cloud
    validations:
      required: true

  - type: input
    id: homey-firmware
    attributes:
      label: Homey firmware version
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: App version
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What should happen.
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happens.
    validations:
      required: true

  - type: textarea
    id: screenshots-logs
    attributes:
      label: Screenshots / Logs
      description: If available, add screenshots or error logs from the Homey developer tools.
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other relevant information.
    validations:
      required: false
